<svg xmlns="http://www.w3.org/2000/svg" width="600" height="300" viewBox="0 0 600 300" role="img" aria-label="An illustration about HTML and semantic tags">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b3b8c"/>
      <stop offset="1" stop-color="#061126"/>
    </linearGradient>
    <linearGradient id="screen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b7cff"/>
      <stop offset="1" stop-color="#1457c9"/>
    </linearGradient>
  </defs>
  <rect width="600" height="300" fill="url(#bg)"/>
  <g opacity="0.25">
    <circle cx="480" cy="60" r="55" fill="#7aa8ff"/>
    <circle cx="520" cy="120" r="35" fill="#5b8cff"/>
    <circle cx="80" cy="220" r="75" fill="#7aa8ff"/>
  </g>

  <!-- Desk -->
  <rect x="0" y="215" width="600" height="85" fill="#0f203f"/>
  <rect x="0" y="235" width="600" height="65" fill="#0a152d"/>

  <!-- Laptop -->
  <g transform="translate(170,70)">
    <!-- Screen -->
    <rect x="0" y="0" rx="14" ry="14" width="260" height="150" fill="#0a1735" stroke="#9cc4ff" stroke-opacity="0.6" stroke-width="2"/>
    <rect x="10" y="10" rx="10" ry="10" width="240" height="130" fill="url(#screen)"/>
    <!-- HTML snippet -->
    <text x="26" y="44" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#eaf2ff" opacity="0.95">
      &lt;header&gt;
    </text>
    <text x="42" y="64" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#eaf2ff" opacity="0.9">
      &lt;nav&gt;...&lt;/nav&gt;
    </text>
    <text x="26" y="84" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#eaf2ff" opacity="0.85">
      &lt;main&gt;
    </text>
    <text x="42" y="104" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#eaf2ff" opacity="0.8">
      &lt;section&gt;
    </text>
    <text x="58" y="124" font-family="Consolas, 'Courier New', monospace" font-size="12" fill="#eaf2ff" opacity="0.75">
      &lt;article&gt;...&lt;/article&gt;
    </text>

    <!-- Base -->
    <rect x="85" y="152" width="90" height="20" rx="8" fill="#0a1735" stroke="#9cc4ff" stroke-opacity="0.6" stroke-width="2"/>
    <rect x="45" y="172" width="170" height="14" rx="7" fill="#0a1735" stroke="#9cc4ff" stroke-opacity="0.35" stroke-width="2"/>
    <!-- Shadow -->
    <ellipse cx="130" cy="220" rx="95" ry="20" fill="#000" opacity="0.25"/>
  </g>

  <!-- Badge -->
  <g transform="translate(20,22)">
    <rect x="0" y="0" rx="12" ry="12" width="170" height="44" fill="#0a1735" stroke="#9cc4ff" stroke-opacity="0.55"/>
    <text x="16" y="28" font-family="Arial, sans-serif" font-size="18" fill="#cfe4ff" opacity="0.95">
      HTML (semantic)
    </text>
  </g>
</svg>

